<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Produtividade 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --text:#e8eaf0;
    --muted:#8b8fa8; --accent:#4ade80; --accent2:#22c55e;
    --header:#1e2130; --input:#13151f; --tag:#252840;
    --row-hi:#1a2a1f; --fs:14px;
  }
  body.light {
    --bg:#f0f4f8; --card:#ffffff; --border:#dde3ed; --text:#1a1d2e;
    --muted:#6b7280; --accent:#16a34a; --accent2:#15803d;
    --header:#e8f5e9; --input:#f9fafb; --tag:#e8f0fe;
    --row-hi:#f0fff4;
  }
  body { background:var(--bg); color:var(--text); font-family:'Sora',sans-serif; font-size:var(--fs); transition:background .3s,color .3s; min-height:100vh; }

  /* HEADER */
  header { background:var(--card); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 1px 12px #00000030; }
  .logo { font-weight:800; font-size:1.15em; letter-spacing:-.5px; color:var(--accent); }
  .controls { display:flex; gap:8px; align-items:center; }
  .btn { background:var(--card); color:var(--text); border:1.5px solid var(--border); border-radius:8px; padding:6px 14px; font-size:.85em; cursor:pointer; font-weight:600; font-family:'Sora',sans-serif; transition:all .2s; }
  .btn:hover { border-color:var(--accent); color:var(--accent); }
  .btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .icon-btn { background:transparent; border:1.5px solid var(--border); border-radius:8px; color:var(--muted); cursor:pointer; padding:5px 10px; font-size:.9em; font-family:'Sora',sans-serif; transition:all .2s; }
  .icon-btn:hover { border-color:var(--accent); color:var(--accent); }
  .back-btn { background:transparent; border:1.5px solid var(--border); border-radius:8px; color:var(--text); cursor:pointer; padding:6px 16px; font-size:.9em; font-weight:600; font-family:'Sora',sans-serif; display:flex; align-items:center; gap:6px; transition:all .2s; }
  .back-btn:hover { border-color:var(--accent); }

  /* CONTENT */
  .content { max-width:1100px; margin:0 auto; padding:28px 20px; }
  .page { display:none; }
  .page.active { display:block; }

  /* SECTION TITLE */
  .section-title { font-size:.78em; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1.5px; margin:24px 0 12px; }

  /* CARDS */
  .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:16px; }

  /* MONTH GRID */
  .month-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; margin-bottom:32px; }
  .month-card { background:var(--card); border:1.5px solid var(--border); border-radius:14px; padding:18px; cursor:pointer; transition:all .22s; }
  .month-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 4px 20px #4ade8022; }
  .month-card.current { background:var(--accent); border-color:var(--accent); box-shadow:0 4px 20px #4ade8044; transform:translateY(-2px); }
  .month-card .mab { font-size:.72em; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--muted); }
  .month-card.current .mab { color:#d1fae5; }
  .month-card .mname { font-size:1.2em; font-weight:800; margin-top:4px; }
  .month-card.current .mname { color:#fff; }
  .month-card .mrow { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
  .month-card .mlabel { font-size:.75em; color:var(--muted); }
  .month-card.current .mlabel { color:#d1fae5; }
  .month-card .mtotal { font-size:1.1em; font-weight:800; color:var(--accent); }
  .month-card.current .mtotal { color:#fff; }
  .month-card .mbadge { font-size:.68em; color:#a7f3d0; font-weight:600; margin-top:6px; }

  /* CHARTS */
  .charts-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; margin-bottom:28px; }
  .metric-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
  .metric-label { font-size:.7em; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .metric-val { font-size:1.6em; font-weight:800; line-height:1; }
  .metric-delta { font-size:.8em; font-weight:700; margin-left:8px; }
  .delta-up { color:#4ade80; }
  .delta-dn { color:#f87171; }
  .delta-eq { color:var(--muted); }
  .chart-wrap { margin-top:12px; position:relative; height:90px; }
  .bar-wrap { position:relative; height:220px; }

  /* TABLE */
  .cat-title { font-size:.72em; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:1.2px; margin-bottom:14px; }
  table { width:100%; border-collapse:collapse; }
  th { background:var(--header); color:var(--muted); font-size:.7em; text-transform:uppercase; letter-spacing:1px; padding:10px 12px; text-align:left; font-weight:700; }
  td { padding:9px 12px; border-bottom:1px solid var(--border); font-size:.9em; vertical-align:middle; }
  tr.has-val td { background:var(--row-hi); transition:background .2s; }
  .val-badge { display:inline-block; margin-left:8px; font-size:.68em; background:var(--accent-bg,#4ade8030); color:var(--accent); border-radius:4px; padding:1px 6px; font-weight:700; }
  input[type=number], input[type=text] {
    background:var(--input); border:1.5px solid var(--border); border-radius:7px;
    color:var(--text); padding:6px 10px; font-size:.9em; font-family:'Sora',sans-serif;
    outline:none; transition:border .2s; width:100%;
  }
  input[type=number] { width:70px; text-align:center; font-weight:700; }
  input:focus { border-color:var(--accent); }
  .qty-hi { border-color:var(--accent) !important; }

  /* BOTTOM BAR */
  .bottom-bar { display:flex; justify-content:flex-end; align-items:center; gap:16px; margin-top:16px; }
  .total-badge { background:#4ade8022; color:var(--accent); border:1.5px solid #4ade8055; border-radius:8px; padding:5px 16px; font-weight:700; font-size:.95em; }
  .gen-btn { background:var(--accent); color:#fff; border:none; border-radius:9px; padding:10px 22px; font-size:.9em; font-weight:700; cursor:pointer; font-family:'Sora',sans-serif; box-shadow:0 3px 12px #4ade8055; transition:all .2s; }
  .gen-btn:hover { opacity:.88; transform:translateY(-1px); }

  /* MONTH HEADER */
  .month-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
  .month-title { font-size:1.4em; font-weight:800; }
  .month-sub { color:var(--muted); font-size:.85em; margin-top:2px; }
  .month-actions { display:flex; align-items:center; gap:12px; }

  @media(max-width:600px) {
    header { padding:10px 14px; }
    .content { padding:16px 12px; }
    .month-grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">📋 Produtividade 2025</div>
  <div class="controls">
    <span id="saveStatus" style="font-size:.78em;font-weight:600;opacity:0;transition:opacity .4s;min-width:110px;text-align:right"></span>
    <button class="icon-btn" id="btnFontDn" title="Diminuir fonte">A−</button>
    <button class="icon-btn" id="btnFontUp" title="Aumentar fonte">A+</button>
    <button class="icon-btn" id="btnClear" title="Limpar todos os dados" style="color:#f87171;border-color:#f8717140">🗑</button>
    <button class="btn" id="btnTheme">☀ Claro</button>
  </div>
</header>

<!-- DASHBOARD PAGE -->
<div class="page active" id="pageDashboard">
  <div class="content">
    <div style="font-size:1.5em;font-weight:800;margin-bottom:4px">Dashboard</div>
    <div style="color:var(--muted);font-size:.88em;margin-bottom:8px">Controle de Produtividade Policial — 2025</div>

    <div class="section-title" id="compareTitle">📊 Comparativo</div>

    <!-- Big bar chart -->
    <div class="card" style="margin-bottom:20px">
      <div style="font-size:.8em;font-weight:700;color:var(--muted);margin-bottom:16px" id="barChartLabel">Principais Métricas</div>
      <div class="bar-wrap"><canvas id="chartBar"></canvas></div>
    </div>

    <!-- Mini line charts -->
    <div class="section-title">📈 Evolução Anual por Métrica</div>
    <div class="charts-grid" id="chartsGrid"></div>

    <!-- Month grid -->
    <div class="section-title">📅 Meses do Ano</div>
    <div class="month-grid" id="monthGrid"></div>
  </div>
</div>

<!-- MONTH PAGE -->
<div class="page" id="pageMonth">
  <div class="content">
    <div class="month-header">
      <div>
        <div class="month-title" id="monthTitle"></div>
        <div class="month-sub">Preencha as quantidades e observações</div>
      </div>
      <div class="month-actions">
        <span class="total-badge" id="monthTotalBadge">Total: 0</span>
        <button class="gen-btn" id="btnExport">📄 Exportar PDF</button>
      </div>
    </div>
    <div id="monthContent"></div>
    <div class="bottom-bar">
      <span class="total-badge" id="monthTotalBadge2">Total do Mês: 0</span>
      <button class="gen-btn" id="btnExport2">📄 Exportar PDF</button>
    </div>
  </div>
</div>

<script>
const ITEMS = [
  { id:"rel_int", label:"Relatórios Internos", cat:"Documentos de Inteligência – Internos" },
  { id:"ord_bus", label:"Ordens de Busca", cat:"Documentos de Inteligência – Internos" },
  { id:"rel_bus", label:"Relatórios de Busca", cat:"Documentos de Inteligência – Internos" },
  { id:"ped_bus", label:"Pedidos de Busca", cat:"Documentos de Inteligência – Externos" },
  { id:"comunicados", label:"Comunicados", cat:"Documentos de Inteligência – Externos" },
  { id:"sumarios", label:"Sumários", cat:"Documentos de Inteligência – Externos" },
  { id:"relint", label:"Relatórios de Inteligência (RELINT's)", cat:"Documentos de Inteligência – Externos" },
  { id:"rt", label:"Relatórios Técnicos (RT's)", cat:"Documentos de Inteligência – Externos" },
  { id:"aut_tel", label:"Autos Circunstanciados de Interceptação Telefônica", cat:"Docs de Atividade de Polícia Judiciária" },
  { id:"aut_tel2", label:"Autos Circunstanciados de Interceptação Telemática", cat:"Docs de Atividade de Polícia Judiciária" },
  { id:"ntec", label:"Notas Técnicas (NTEC's)", cat:"Docs de Atividade de Polícia Judiciária" },
  { id:"rat", label:"Relatórios de Análise Técnica (RAT's)", cat:"Docs de Atividade de Polícia Judiciária" },
  { id:"rinf", label:"Relatórios de Informação (RINF's)", cat:"Docs de Atividade de Polícia Judiciária" },
  { id:"rel_inv", label:"Relatórios de Investigação", cat:"Docs de Atividade de Polícia Judiciária" },
  { id:"rpesp", label:"Relatórios de Pesquisas (RPESP's)", cat:"Docs de Atividade de Polícia Judiciária" },
  { id:"simba", label:"Relatórios do Sistema SIMBA", cat:"Docs de Atividade de Polícia Judiciária" },
  { id:"extr_cel", label:"Relatório Técnico de Extração de Dados de Aparelho Celular/Notebook/Outros", cat:"Docs de Atividade de Polícia Judiciária" },
  { id:"armas", label:"Armas de Fogo", cat:"Bens e Objetos Apreendidos e Recuperados" },
  { id:"celulares", label:"Aparelhos Celulares", cat:"Bens e Objetos Apreendidos e Recuperados" },
  { id:"entorp", label:"Entorpecentes", cat:"Bens e Objetos Apreendidos e Recuperados" },
  { id:"valores", label:"Valores", cat:"Bens e Objetos Apreendidos e Recuperados" },
  { id:"veiculos", label:"Veículos", cat:"Bens e Objetos Apreendidos e Recuperados" },
  { id:"outros_obj", label:"Outros Objetos Relevantes", cat:"Bens e Objetos Apreendidos e Recuperados" },
  { id:"ap_tel", label:"Apoio em Operações de Interceptação Telefônica e/ou Quebra de Dados Telefônicos em Outras Unidades Policiais", cat:"Atividades de Interceptação Telefônica e Telemática" },
  { id:"ap_tel2", label:"Apoio em Operações de Interceptação Telemática e/ou Quebra de Dados Telemáticos em Outras Unidades Policiais", cat:"Atividades de Interceptação Telefônica e Telemática" },
  { id:"op_tel", label:"Operacionalização de Decisão Judicial de Interceptação Telefônica e/ou Quebra de Sigilo de Dados Telefônicos (Operações Internas ao NIP e NAIS)", cat:"Atividades de Interceptação Telefônica e Telemática" },
  { id:"op_tel2", label:"Operacionalização de Decisão Judicial de Interceptação Telemática e/ou Quebra de Sigilo de Dados Telemáticos (Operações Internas ao NIP e NAIS)", cat:"Atividades de Interceptação Telefônica e Telemática" },
  { id:"op_acomp", label:"Operações Acompanhadas", cat:"Atividades de Interceptação Telefônica e Telemática" },
  { id:"alvos_acomp", label:"Alvos Acompanhados", cat:"Atividades de Interceptação Telefônica e Telemática" },
  { id:"audios", label:"Áudios Ouvidos", cat:"Atividades de Interceptação Telefônica e Telemática" },
  { id:"ped_emerg", label:"Pedidos Emergenciais (Telemáticos) Elaborados", cat:"Atividades de Interceptação Telefônica e Telemática" },
  { id:"dados_cad", label:"Dados Cadastrais Requeridos (Via Ofício ou com Base em Decisão Judicial)", cat:"Atividades de Interceptação Telefônica e Telemática" },
  { id:"alvos_id", label:"Alvos Identificados e Qualificados", cat:"Atividades de Interceptação Telefônica e Telemática" },
  { id:"mandado_bus", label:"Apoio ao Cumprimento de Mandado de Busca e Apreensão Domiciliar", cat:"Outras Informações" },
  { id:"pris_mand", label:"Apoio a Prisões Efetuadas em Cumprimento a Mandados de Prisão Temporária/Preventiva", cat:"Outras Informações" },
  { id:"pris_flag", label:"Apoio a Prisões Efetuadas em Flagrante Delito", cat:"Outras Informações" },
  { id:"pris_int1", label:"Prisões Efetuadas em Cumprimento a Mandados de Prisão Temporária/Preventiva (Investigações Internas)", cat:"Outras Informações" },
  { id:"pris_int2", label:"Prisões Efetuadas em Flagrante Delito (Equipe NIP e NAIS)", cat:"Outras Informações" },
  { id:"cump_mand", label:"Cumprimento de Mandados de Busca e Apreensão Domiciliar (Investigações Internas)", cat:"Outras Informações" },
  { id:"informes", label:"Informes", cat:"Outras Informações" },
  { id:"proc_pol", label:"Procedimentos Policiais Instaurados", cat:"Outras Informações" },
  { id:"vpi", label:"Verificação de Procedência de Informação (VPI's) Instauradas", cat:"Outras Informações" },
  { id:"cursos_min", label:"Cursos Ministrados (Citar Nome e Duração)", cat:"Outras Informações" },
  { id:"cursos_aper", label:"Cursos de Aperfeiçoamento de Servidores (Citar Nome e Duração)", cat:"Outras Informações" },
];

const MONTHS = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const MONTHS_SHORT = MONTHS.map(m => m.slice(0,3));

const KEY_METRICS = [
  { label:"Prisões", ids:["pris_flag","pris_mand","pris_int1","pris_int2"], color:"#4ade80" },
  { label:"Mandados de Busca", ids:["mandado_bus","cump_mand"], color:"#60a5fa" },
  { label:"Rel. Técnicos (RT's)", ids:["rt"], color:"#f59e0b" },
  { label:"RELINT's", ids:["relint"], color:"#f472b6" },
];

const CATS = [...new Set(ITEMS.map(i => i.cat))];
const YEAR = 2025;

// ── STATE ──────────────────────────────────────────────
let isDark = true;
let currentFontSize = 14;
let currentMonthView = 0;

const NOW = new Date();
const CUR_M = NOW.getMonth();
const PREV_M = CUR_M === 0 ? 11 : CUR_M - 1;

// data[monthIdx][itemId] = { qty: number, obs: string }
const data = {};
MONTHS.forEach((_, i) => {
  data[i] = {};
  ITEMS.forEach(it => { data[i][it.id] = { qty: 0, obs: "" }; });
});

// ── CHARTS ─────────────────────────────────────────────
let barChart = null;
const lineCharts = {};

function getMetric(mIdx, ids) {
  return ids.reduce((a, id) => a + (parseInt(data[mIdx][id].qty) || 0), 0);
}

function getTotal(mIdx) {
  return ITEMS.reduce((a, it) => a + (parseInt(data[mIdx][it.id].qty) || 0), 0);
}

function getCSSVar(v) {
  return getComputedStyle(document.body).getPropertyValue(v).trim();
}

function buildBarChart() {
  const ctx = document.getElementById('chartBar').getContext('2d');
  const borderColor = getCSSVar('--border');
  const mutedColor = getCSSVar('--muted');
  const accentColor = getCSSVar('--accent');
  const cardColor = getCSSVar('--card');
  const textColor = getCSSVar('--text');

  const labels = KEY_METRICS.map(m => m.label);
  const prevData = KEY_METRICS.map(m => getMetric(PREV_M, m.ids));
  const currData = KEY_METRICS.map(m => getMetric(CUR_M, m.ids));

  if (barChart) barChart.destroy();
  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: MONTHS[PREV_M], data: prevData, backgroundColor: mutedColor + '99', borderRadius: 6, borderSkipped: false },
        { label: MONTHS[CUR_M], data: currData, backgroundColor: accentColor, borderRadius: 6, borderSkipped: false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: mutedColor, font: { family: 'Sora', size: 11 } } },
        tooltip: { backgroundColor: cardColor, titleColor: textColor, bodyColor: mutedColor, borderColor, borderWidth: 1, cornerRadius: 10 }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: mutedColor, font: { family: 'Sora', size: 11 } }, border: { display: false } },
        y: { grid: { color: borderColor, drawBorder: false }, ticks: { color: mutedColor, font: { family: 'Sora', size: 11 } }, border: { display: false } }
      }
    }
  });
}

function buildMiniCharts() {
  const grid = document.getElementById('chartsGrid');
  grid.innerHTML = '';
  KEY_METRICS.forEach((m, mi) => {
    const currVal = getMetric(CUR_M, m.ids);
    const prevVal = getMetric(PREV_M, m.ids);
    const delta = currVal - prevVal;
    const deltaHtml = delta > 0
      ? `<span class="metric-delta delta-up">▲ +${delta}</span>`
      : delta < 0
      ? `<span class="metric-delta delta-dn">▼ ${delta}</span>`
      : `<span class="metric-delta delta-eq">= igual</span>`;

    const div = document.createElement('div');
    div.className = 'metric-card';
    div.innerHTML = `
      <div class="metric-label">${m.label}</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:12px">
        <span class="metric-val" style="color:${m.color}">${currVal}</span>
        ${deltaHtml}
      </div>
      <div class="chart-wrap"><canvas id="lineChart${mi}"></canvas></div>
    `;
    grid.appendChild(div);

    const yearData = MONTHS.map((_, i) => getMetric(i, m.ids));
    const borderColor = getCSSVar('--border');
    const mutedColor = getCSSVar('--muted');
    const cardColor = getCSSVar('--card');
    const textColor = getCSSVar('--text');

    const pointRadii = MONTHS.map((_, i) => i === CUR_M ? 6 : 3);
    const pointBg = MONTHS.map((_, i) => i === CUR_M ? m.color : m.color + '80');

    if (lineCharts[mi]) lineCharts[mi].destroy();
    lineCharts[mi] = new Chart(document.getElementById(`lineChart${mi}`).getContext('2d'), {
      type: 'line',
      data: {
        labels: MONTHS_SHORT,
        datasets: [{
          data: yearData,
          borderColor: m.color,
          borderWidth: 2.5,
          pointBackgroundColor: pointBg,
          pointRadius: pointRadii,
          pointHoverRadius: 7,
          tension: 0.35,
          fill: true,
          backgroundColor: m.color + '18',
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: cardColor, titleColor: textColor, bodyColor: m.color, borderColor, borderWidth: 1, cornerRadius: 8,
            callbacks: { label: ctx => ` ${ctx.parsed.y}` }
          }
        },
        scales: {
          x: { grid: { display: false }, ticks: { color: mutedColor, font: { family: 'Sora', size: 9 } }, border: { display: false } },
          y: { grid: { color: borderColor }, ticks: { color: mutedColor, font: { family: 'Sora', size: 9 } }, border: { display: false } }
        }
      }
    });
  });
}

function buildMonthGrid() {
  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';
  MONTHS.forEach((m, i) => {
    const total = getTotal(i);
    const isCur = i === CUR_M;
    const card = document.createElement('div');
    card.className = 'month-card' + (isCur ? ' current' : '');
    card.innerHTML = `
      <div class="mab">${m.slice(0,3).toUpperCase()}</div>
      <div class="mname">${m}</div>
      <div class="mrow">
        <span class="mlabel">Total</span>
        <span class="mtotal" id="monthTotal_${i}">${total}</span>
      </div>
      ${isCur ? '<div class="mbadge">● Mês atual</div>' : ''}
    `;
    card.addEventListener('click', () => openMonth(i));
    grid.appendChild(card);
  });
}

function updateDashboardTitles() {
  document.getElementById('compareTitle').textContent = `📊 Comparativo: ${MONTHS[CUR_M]} vs ${MONTHS[PREV_M]}`;
  document.getElementById('barChartLabel').textContent = `Principais Métricas — ${MONTHS[PREV_M]} vs ${MONTHS[CUR_M]}`;
}

function refreshDashboard() {
  updateDashboardTitles();
  buildBarChart();
  buildMiniCharts();
  buildMonthGrid();
}

// ── MONTH VIEW ─────────────────────────────────────────
function openMonth(mIdx) {
  currentMonthView = mIdx;
  document.getElementById('pageDashboard').classList.remove('active');
  document.getElementById('pageMonth').classList.add('active');
  document.getElementById('monthTitle').textContent = `${MONTHS[mIdx]} ${YEAR}`;

  // Build header row
  const header = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px">
      <button class="back-btn" id="btnBack">← Dashboard</button>
    </div>
  `;

  let html = '';
  CATS.forEach(cat => {
    const catItems = ITEMS.filter(it => it.cat === cat);
    html += `<div class="card">
      <div class="cat-title">${cat}</div>
      <table>
        <thead><tr>
          <th style="width:55%">Item</th>
          <th style="width:80px;text-align:center">Qtd</th>
          <th>Observação</th>
        </tr></thead>
        <tbody>`;
    catItems.forEach(it => {
      const v = data[mIdx][it.id];
      const hv = (v.qty > 0);
      html += `<tr id="row_${mIdx}_${it.id}" class="${hv ? 'has-val' : ''}">
        <td>
          <span>${it.label}</span>
          ${hv ? `<span class="val-badge" id="vbadge_${mIdx}_${it.id}">${v.qty}</span>` : `<span class="val-badge" id="vbadge_${mIdx}_${it.id}" style="display:none">${v.qty}</span>`}
        </td>
        <td style="text-align:center">
          <input type="number" min="0" value="${v.qty || ''}" placeholder="0"
            class="qty-input ${hv ? 'qty-hi' : ''}"
            data-month="${mIdx}" data-id="${it.id}"
            id="qty_${mIdx}_${it.id}"/>
        </td>
        <td>
          <input type="text" value="${v.obs || ''}" placeholder="Observação opcional..."
            data-month="${mIdx}" data-id="${it.id}"
            id="obs_${mIdx}_${it.id}"/>
        </td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });

  document.getElementById('monthContent').innerHTML = header + html;
  updateMonthTotal(mIdx);

  document.getElementById('btnBack').addEventListener('click', () => {
    document.getElementById('pageMonth').classList.remove('active');
    document.getElementById('pageDashboard').classList.add('active');
    refreshDashboard();
  });

  // Events for qty inputs
  document.querySelectorAll('.qty-input').forEach(inp => {
    inp.addEventListener('input', e => {
      const m = parseInt(e.target.dataset.month);
      const id = e.target.dataset.id;
      const val = parseInt(e.target.value) || 0;
      data[m][id].qty = val;
      const hv = val > 0;
      const row = document.getElementById(`row_${m}_${id}`);
      const badge = document.getElementById(`vbadge_${m}_${id}`);
      if (hv) { row.classList.add('has-val'); inp.classList.add('qty-hi'); badge.style.display=''; badge.textContent=val; }
      else { row.classList.remove('has-val'); inp.classList.remove('qty-hi'); badge.style.display='none'; }
      updateMonthTotal(m);
      scheduleSave();
    });
  });

  // Events for obs inputs
  document.querySelectorAll('#monthContent input[type=text]').forEach(inp => {
    inp.addEventListener('input', e => {
      const m = parseInt(e.target.dataset.month);
      const id = e.target.dataset.id;
      data[m][id].obs = e.target.value;
      scheduleSave();
    });
  });

  // Export buttons
  document.getElementById('btnExport').addEventListener('click', () => exportReport(mIdx));
  document.getElementById('btnExport2').addEventListener('click', () => exportReport(mIdx));
}

function updateMonthTotal(mIdx) {
  const t = getTotal(mIdx);
  const b1 = document.getElementById('monthTotalBadge');
  const b2 = document.getElementById('monthTotalBadge2');
  if (b1) b1.textContent = `Total: ${t}`;
  if (b2) b2.textContent = `Total do Mês: ${t}`;
}

// ── EXPORT PDF (jsPDF) ─────────────────────────────────
function exportReport(mIdx) {
  const { jsPDF } = window.jspdf;
  const month = MONTHS[mIdx];
  const total = getTotal(mIdx);
  const now = new Date();
  const dateStr = now.toLocaleDateString('pt-BR');
  const timeStr = now.toLocaleTimeString('pt-BR');

  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const PW = 210, PH = 297;
  const ML = 14, MR = 14, MT = 14;
  let y = MT;

  // ── helpers
  const setFont = (style, size) => { doc.setFont('helvetica', style); doc.setFontSize(size); };
  const hex2rgb = h => { const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16); return [r,g,b]; };
  const fillRect = (x, fy, w, fh, hex) => { doc.setFillColor(...hex2rgb(hex)); doc.rect(x, fy, w, fh, 'F'); };
  const textC = (txt, fy, hex='#ffffff', size=10, style='normal') => {
    setFont(style, size); doc.setTextColor(...hex2rgb(hex));
    doc.text(txt, PW/2, fy, { align:'center' });
  };

  // ── HEADER BLOCK
  fillRect(0, 0, PW, 28, '#1a2e1a');
  fillRect(0, 24, PW, 4, '#4ade80');
  textC('RELATÓRIO DE PRODUTIVIDADE POLICIAL', 10, '#4ade80', 13, 'bold');
  textC(`${month.toUpperCase()} / ${YEAR}`, 17, '#ffffff', 10, 'normal');
  textC(`Emitido em ${dateStr} às ${timeStr}`, 22, '#a7f3d0', 8, 'normal');
  y = 34;

  // ── KEY METRICS SUMMARY
  const metrics = KEY_METRICS.map(m => ({ label: m.label, val: getMetric(mIdx, m.ids), color: m.color }));
  const mW = (PW - ML - MR - 6) / 4;
  metrics.forEach((m, i) => {
    const mx = ML + i * (mW + 2);
    fillRect(mx, y, mW, 16, '#f0fff4');
    doc.setDrawColor(74, 222, 128);
    doc.setLineWidth(0.4);
    doc.rect(mx, y, mW, 16, 'D');
    setFont('bold', 14); doc.setTextColor(...hex2rgb(m.color));
    doc.text(String(m.val), mx + mW/2, y + 8, { align:'center' });
    setFont('normal', 6); doc.setTextColor(80, 90, 80);
    const lines = doc.splitTextToSize(m.label, mW - 2);
    doc.text(lines[0], mx + mW/2, y + 12, { align:'center' });
  });
  y += 22;

  // ── TABLE HEADER ROW HEIGHTS
  const ROW_H = 6.5;
  const COL = { cat: ML, item: ML+36, qty: ML+36+78, obs: ML+36+78+14 };
  const WIDTHS = { cat: 35, item: 77, qty: 13, obs: PW-MR-COL.obs };

  const drawTableHeader = () => {
    fillRect(ML, y, PW-ML-MR, 7, '#1a472a');
    setFont('bold', 7.5); doc.setTextColor(255,255,255);
    doc.text('CATEGORIA', COL.cat+1, y+5);
    doc.text('ITEM', COL.item+1, y+5);
    doc.text('QTD', COL.qty+1, y+5, { align:'center' });
    doc.text('OBSERVAÇÃO', COL.obs+1, y+5);
    y += 7;
  };

  const checkPage = (needed) => {
    if (y + needed > PH - 18) {
      doc.addPage();
      y = 14;
      drawTableHeader();
    }
  };

  // ── ITERATE CATEGORIES
  CATS.forEach(cat => {
    const catItems = ITEMS.filter(it => it.cat === cat);

    // Category separator
    checkPage(8);
    fillRect(ML, y, PW-ML-MR, 6, '#e8f5e9');
    setFont('bold', 8); doc.setTextColor(22,101,52);
    doc.text(cat.toUpperCase(), COL.cat+1, y+4.2);
    y += 6;

    // Table header
    drawTableHeader();

    catItems.forEach((it, idx) => {
      const v = data[mIdx][it.id];
      const hasVal = (parseInt(v.qty) || 0) > 0;

      // Wrap text to measure needed height
      const itemLines = doc.splitTextToSize(it.label, WIDTHS.item - 2);
      const obsLines  = doc.splitTextToSize(v.obs || '', WIDTHS.obs - 2);
      const maxLines  = Math.max(itemLines.length, obsLines.length, 1);
      const rh = Math.max(ROW_H, maxLines * 4.2 + 2);

      checkPage(rh);

      // Row background
      if (hasVal) fillRect(ML, y, PW-ML-MR, rh, '#f0fff4');
      else if (idx % 2 === 0) fillRect(ML, y, PW-ML-MR, rh, '#fafafa');
      else fillRect(ML, y, PW-ML-MR, rh, '#ffffff');

      // Row border
      doc.setDrawColor(220,230,220);
      doc.setLineWidth(0.2);
      doc.rect(ML, y, PW-ML-MR, rh, 'D');

      const ty = y + 4;
      setFont('normal', 7.5); doc.setTextColor(40,40,40);
      // Category abbrev
      const catShort = doc.splitTextToSize(cat.split('–').pop().trim(), WIDTHS.cat-2);
      doc.text(catShort, COL.cat+1, ty, { lineHeightFactor: 1.35 });

      // Item label
      doc.text(itemLines, COL.item+1, ty, { lineHeightFactor: 1.35 });

      // Qty — highlight if > 0
      if (hasVal) {
        fillRect(COL.qty, y+1, WIDTHS.qty, rh-2, '#4ade80');
        setFont('bold', 8.5); doc.setTextColor(20,80,20);
      } else {
        setFont('normal', 7.5); doc.setTextColor(160,160,160);
      }
      doc.text(String(parseInt(v.qty)||0), COL.qty + WIDTHS.qty/2, ty, { align:'center' });

      // Obs
      setFont('normal', 7); doc.setTextColor(80,80,80);
      if (obsLines.length > 0) doc.text(obsLines, COL.obs+1, ty, { lineHeightFactor: 1.35 });

      y += rh;
    });

    y += 2;
  });

  // ── TOTALS FOOTER
  checkPage(14);
  y += 2;
  fillRect(ML, y, PW-ML-MR, 10, '#1a472a');
  setFont('bold', 11); doc.setTextColor(...hex2rgb('#4ade80'));
  doc.text(`TOTAL GERAL: ${total}`, PW - MR - 2, y + 7, { align:'right' });
  setFont('normal', 8); doc.setTextColor(200,240,200);
  doc.text(`Relatório gerado automaticamente — Sistema de Produtividade ${YEAR}`, ML+1, y+7);

  // ── PAGE NUMBERS
  const totalPages = doc.getNumberOfPages();
  for (let p = 1; p <= totalPages; p++) {
    doc.setPage(p);
    setFont('normal', 7); doc.setTextColor(150,150,150);
    doc.text(`Página ${p} de ${totalPages}`, PW/2, PH-6, { align:'center' });
  }

  doc.save(`produtividade_${month}_${YEAR}.pdf`);
}

// ── PERSIST (localStorage) ─────────────────────────────
const LS_KEY = 'produtividade2025_v1';
let saveTimer = null;

function saveData() {
  try {
    const payload = { data, isDark, currentFontSize };
    localStorage.setItem(LS_KEY, JSON.stringify(payload));
    showSaveStatus('✓ Salvo', '#4ade80');
  } catch(e) {
    showSaveStatus('⚠ Erro ao salvar', '#f87171');
  }
}

function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return false;
    const payload = JSON.parse(raw);
    // Restore data
    if (payload.data) {
      MONTHS.forEach((_, i) => {
        if (payload.data[i]) {
          ITEMS.forEach(it => {
            if (payload.data[i][it.id]) {
              data[i][it.id] = payload.data[i][it.id];
            }
          });
        }
      });
    }
    // Restore theme
    if (payload.isDark === false) {
      isDark = false;
      document.body.classList.add('light');
      document.getElementById('btnTheme').textContent = '🌙 Escuro';
    }
    // Restore font size
    if (payload.currentFontSize) {
      currentFontSize = payload.currentFontSize;
      document.documentElement.style.setProperty('--fs', currentFontSize + 'px');
    }
    return true;
  } catch(e) { return false; }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveData, 800);
  showSaveStatus('...salvando', 'var(--muted)');
}

function showSaveStatus(msg, color) {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color;
  el.style.opacity = '1';
  clearTimeout(el._fadeTimer);
  el._fadeTimer = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

function clearAllData() {
  if (!confirm('Limpar todos os dados? Esta ação não pode ser desfeita.')) return;
  MONTHS.forEach((_, i) => {
    ITEMS.forEach(it => { data[i][it.id] = { qty: 0, obs: '' }; });
  });
  localStorage.removeItem(LS_KEY);
  showSaveStatus('🗑 Dados limpos', '#f87171');
  refreshDashboard();
}

// Patch handleChange to auto-save
const _origQtyEvent = 'input';

// ── THEME & FONT ───────────────────────────────────────
document.getElementById('btnTheme').addEventListener('click', () => {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('btnTheme').textContent = isDark ? '☀ Claro' : '🌙 Escuro';
  scheduleSave();
  setTimeout(() => refreshDashboard(), 50);
});

document.getElementById('btnFontUp').addEventListener('click', () => {
  currentFontSize = Math.min(20, currentFontSize + 1);
  document.documentElement.style.setProperty('--fs', currentFontSize + 'px');
  scheduleSave();
});

document.getElementById('btnFontDn').addEventListener('click', () => {
  currentFontSize = Math.max(11, currentFontSize - 1);
  document.documentElement.style.setProperty('--fs', currentFontSize + 'px');
  scheduleSave();
});

document.getElementById('btnClear').addEventListener('click', clearAllData);

// Save on page hide (tab close / navigate away)
window.addEventListener('pagehide', saveData);
window.addEventListener('beforeunload', saveData);

// ── INIT ───────────────────────────────────────────────
const hadData = loadData();
refreshDashboard();
if (hadData) showSaveStatus('✓ Dados restaurados', '#60a5fa');
</script>
